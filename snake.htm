<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>snake</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        margin: 0;
        background: #111;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: 100vh;
    }
    
    .game-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
        max-width: 100vw;
        max-height: 100vh;
    }
    
    canvas {
        background: black;
        touch-action: none;
        /* Make canvas as large as possible while staying square and visible */
        width: min(100vw, 100vh - 140px);
        height: min(100vw, 100vh - 140px);
        flex-shrink: 0;
    }
    
    .controls {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 5px;
        gap: 5px;
        flex-shrink: 0;
        max-height: 135px;
        overflow-y: auto;
    }
    
    .controls-row {
        display: flex;
        gap: 5px;
    }
    
    button {
        padding: 8px 16px;
        font-size: 14px;
        background: #333;
        color: white;
        border: 1px solid #555;
        border-radius: 5px;
        cursor: pointer;
        min-width: 50px;
    }
    
    button:active {
        background: #555;
    }

    /* For very small screens, make buttons even smaller */
    @media (max-height: 500px) {
        button {
            padding: 5px 10px;
            font-size: 12px;
            min-width: 40px;
        }
        
        .controls {
            gap: 3px;
            margin-top: 3px;
            max-height: 100px;
        }
        
        canvas {
            width: min(100vw, 100vh - 100px);
            height: min(100vw, 100vh - 100px);
        }
    }
</style>
</head>
<body>

<div class="game-container">
    <canvas id="game"></canvas>
    <div class="controls">
        <button onclick="
        if(di!==2){
            di=1
        }
        ">
            up
        </button>
        <div class="controls-row">
            <button onclick="
            if(di!==4){
                di=3
            }
            ">
                left
            </button>
            <button onclick="
            if(di!==3){
                di=4
            }
            ">
                right
            </button>
        </div>
        <button onclick="
        if(di!==1){
            di=2
        }
        ">
            down
        </button>
        <button onclick="
        if(menu===1){
            menu=0
        }
        else if(menu===0){
            menu=1
        }
        ">
            menu
        </button>
    </div>
</div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const WINDOW_WIDTH = 400;
const WINDOW_HEIGHT = 400;
const w = 20;
const h = 20;

/* ============================================================
   GLOBALS
   ============================================================ */
const canvas = document.getElementById("game");
canvas.width = WINDOW_WIDTH;
canvas.height = WINDOW_HEIGHT;

const ctx = canvas.getContext("2d");

let running = true;
let dir = "right";

/* ============================================================
   INPUT
   ============================================================ */
const keys = {};

window.addEventListener("keydown", (e) => {
    keys[e.key] = true;
});

window.addEventListener("keyup", (e) => {
    keys[e.key] = false;
});

/* ============================================================
   UNIVERSAL INPUT (Single handler for Mouse + Touch)
   ============================================================ */
function handleInput(e) {
    e.preventDefault();
    
    let clientX, clientY;
    if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY; 
    } else {
        clientX = e.clientX;
        clientY = e.clientY;  
    }
    
    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;  
    
    // Scale coordinates to match canvas size
    const scaleX = WINDOW_WIDTH / rect.width;
    const scaleY = WINDOW_HEIGHT / rect.height;
    const canvasX = x * scaleX;
    const canvasY = y * scaleY;
    if(175 <=canvasX&& canvasX <=225 && canvasY <=50){
        if(menu===1){
            menu=0
        }
        else{
            menu=1
        }
    }
    else if(menu===1 && 340 <= canvasY && canvasX <= 120){
        style = style+1
        if(style===5){
            style=1
        }
    }
    else if(canvasX >= 320 && canvasY >= 300 && canvasY <= 340 && menu===1){
        time=time/2
        
    }

    else if(canvasX >= 320 && canvasY >= 340 && canvasY <= 380 && menu===1){
        time=time*2
    }

    else if(canvasX>200){
        if(di === 1){di=4}
        else if(di === 4){di=2}
        else if(di === 2){di=3}
        else if(di === 3){di=1}
    }
    else if(canvasX<200){
        if(di === 4){di=1}
        else if(di === 2){di=4}
        else if(di === 3){di=2}
        else if(di === 1){di=3}
    }
    


}

canvas.addEventListener("touchstart", handleInput);
canvas.addEventListener("mousedown", handleInput);

/* ============================================================
   GAME STATE
   ============================================================ */
let seg = [];
for(let i=0; i<4; i++){
    seg.push({ x: 200 - i*w,
                y: 200 
            });
}
let hx=200
let hy=200

let bx=300
let by=300

let di = 1 // 1 - up     2 - down     3 - left     4 - right

let menu=0

let score=0

let style=1

let time=100


/* ============================================================
   MAIN LOOP
   ============================================================ */
function game_loop() {
    if (!running) return;
    /* ===== RENDER ===== */
        //clear screen
        ctx.fillStyle="#000000"
        ctx.fillRect(0, 0, WINDOW_WIDTH, WINDOW_HEIGHT)

        
        ctx.font = "15px Arial";

        if(menu===0){

            
            if (keys["w"]){
                if(di!==2){
                    di = 1
                }
                
            }
            if (keys["s"]){
                if(di!==1){
                    di = 2
                }
            }
            if (keys["d"]){
                if(di!==3){
                    di = 4
                }
            }
            if (keys["a"]){
                if(di!==4){
                    di = 3
                }
            }



            if (keys["ArrowUp"]){
                if(di!==2){
                    di = 1
                }
                
            }
            if (keys["ArrowDown"]){
                if(di!==1){
                    di = 2
                }
            }
            if (keys["ArrowRight"]){
                if(di!==3){
                    di = 4
                }
            }
            if (keys["ArrowLeft"]){
                if(di!==4){
                    di = 3
                }
            }



            if (keys["p"]){
                menu=1
            }
            if (keys[" "]){
                menu=1
            }


            if(di===1){
                hy=hy-h
            }
            if(di===2){
                hy=hy+h
            }
            if(di===3){
                hx=hx-w
            }
            if(di===4){
                hx=hx+w
            }
            
            if (hx === bx && hy ===by){
                bx = Math.floor(Math.random()*20)*20
                by = Math.floor(Math.random()*20)*20

                score=score+1
            }
            else{
                seg.pop()
            }
            for(let i of seg){
                if(i["x"]===hx && i["y"]===hy){
                    seg = [];
                    for(let i=0; i<4; i++){
                        seg.push({ x: 200 - i*w,
                                    y: 200 
                                });
                    }
                    hx=200
                    hy=200

                    bx=300
                    by=300

                    di = 1 // 1 - up     2 - down     3 - left     4 - right

                    menu=0

                    score=0
                    
                }
            }
            seg.reverse()
            seg.push({
                "x":hx,
                "y":hy
            })
            seg.reverse()
            


            if(hx>400){
                hx=0
            }
            if(hx<0){
                hx=400
            }
            if(hy>400){
                hy=0
            }
            if(hy<0){
                hy=400
            }


            

            for(let i of seg){
                if(style===1){
                    ctx.fillStyle="#00ff00"
                    ctx.fillRect(i["x"], i["y"], w, h)
                }
                if(style===2){
                    ctx.fillStyle="#00ff00"
                    ctx.fillRect(i["x"]+2, i["y"]+2, w-4, h-4)
                }
                if(style===3){
                    ctx.fillStyle="#0000ff"
                    ctx.fillRect(i["x"]+4, i["y"]+4, w-4, h-4)
                    ctx.fillStyle="#ff0000"
                    ctx.fillRect(i["x"]+0, i["y"]+0, w-4, h-4)
                    ctx.fillStyle="#00ff00"
                    ctx.fillRect(i["x"]+2, i["y"]+2, w-4, h-4)
                }
                if(style===4){
                    ctx.fillStyle="#FFFFFF"
                    ctx.fillRect(i["x"]+2, i["y"]+2, w-4, h-4)
                }
                
            }
            if(style===1){
                ctx.fillStyle="#ff0000"
                ctx.fillRect(bx, by, w, h)
            }
            if(style===2){
                ctx.fillStyle="#ff0000"
                ctx.fillRect(bx+2, by+2, w-4, h-4)
            }
            if(style===3){
                ctx.fillStyle="#ff3333"
                ctx.fillRect(bx+2, by+2, w-4, h-4)
            }
            if(style===4){
                ctx.fillStyle="#555555"
                ctx.fillRect(bx+2, by+2, w-4, h-4)
            }

            if(style>= 1 && style <= 3){
                ctx.font = "15px Arial";
                ctx.fillStyle="#ff0000"
                ctx.fillText("||",200+2, 20+2)
                ctx.fillStyle="#0000ff"
                ctx.fillText("||",200-2, 20-2)
                ctx.fillStyle="#ffffff"
                ctx.fillText("||",200, 20)
            }
            if(style===4){
                ctx.fillStyle="#ffffff"
                ctx.fillText("||",200, 20)
            }


            ctx.fillStyle="#FFFFFF"
            ctx.fillText("score "+score,20, 20)
        }
        else if(menu===1){

            if (keys["p"]){
                menu=0
            }
            if (keys[" "]){
                menu=0
            }


            for(let i of seg){
                if(style===1){
                    ctx.fillStyle="#00ff00"
                    ctx.fillRect(i["x"], i["y"], w, h)
                }
                if(style===2){
                    ctx.fillStyle="#00ff00"
                    ctx.fillRect(i["x"]+2, i["y"]+2, w-4, h-4)
                }
                if(style===3){
                    ctx.fillStyle="#0000ff"
                    ctx.fillRect(i["x"]+4, i["y"]+4, w-4, h-4)
                    ctx.fillStyle="#ff0000"
                    ctx.fillRect(i["x"]+0, i["y"]+0, w-4, h-4)
                    ctx.fillStyle="#00ff00"
                    ctx.fillRect(i["x"]+2, i["y"]+2, w-4, h-4)
                }
                if(style===4){
                    ctx.fillStyle="#FFFFFF"
                    ctx.fillRect(i["x"]+2, i["y"]+2, w-4, h-4)
                }
                
            }
            
            if(style===1){
                ctx.fillStyle="#ff0000"
                ctx.fillRect(bx, by, w, h)
            }
            if(style===2){
                ctx.fillStyle="#ff0000"
                ctx.fillRect(bx+2, by+2, w-4, h-4)
            }
            if(style===3){
                ctx.fillStyle="#ff3333"
                ctx.fillRect(bx+2, by+2, w-4, h-4)
            }
            if(style===4){
                ctx.fillStyle="#555555"
                ctx.fillRect(bx+2, by+2, w-4, h-4)
            }


            
            if(style>= 1 && style <= 3){
                ctx.font = "30px Arial";
                ctx.fillStyle="#ff0000"
                ctx.fillText("SNAKE GAME",100+2, 100+2)
                ctx.fillStyle="#0000ff"
                ctx.fillText("SNAKE GAME",100-2, 100-2)
                ctx.fillStyle="#ffffff"
                ctx.fillText("SNAKE GAME",100, 100)
            }
            if(style===4){
                ctx.fillStyle="#ffffff"
                ctx.fillText("SNAKE GAME",100, 100)
            }
            


            if(style>= 1 && style <= 3){
                ctx.font = "15px Arial";
                ctx.fillStyle="#ff0000"
                ctx.fillText("||",200+2, 20+2)
                ctx.fillStyle="#0000ff"
                ctx.fillText("||",200-2, 20-2)
                ctx.fillStyle="#ffffff"
                ctx.fillText("||",200, 20)
            }
            if(style===4){
                ctx.fillStyle="#ffffff"
                ctx.fillText("||",200, 20)
            }
            


            ctx.fillStyle="#FFFFFF"
            ctx.fillText("score "+score,20, 20)


            ctx.fillStyle="#FFFFFF"
            ctx.fillText("change style",20, 360)
            ctx.fillStyle="#FFFFFF"
            ctx.fillText("style "+style,20, 380)

            ctx.fillStyle="#FFFFFF"
            ctx.fillText("x 2 speed",320, 320)
            ctx.fillStyle="#FFFFFF"
            ctx.fillText("x 0.5 speed",320, 360)
        }
        

    setTimeout(() => {
        requestAnimationFrame(game_loop);
    }, time);
}

game_loop();
</script>
</body>
</html>
